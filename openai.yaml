openapi: 3.0.0
info:
  title: Anime Viewing Log API
  description: API for tracking anime viewing history and managing user lists.
  version: 1.0.0

servers:
  - url: /api
    description: Main API server

paths:
  /register/:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        "201":
          description: User created successfully

  /login/:
    post:
      summary: Log in a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login successful (session cookie is set)

  /logout/:
    post:
      summary: Log out a user
      responses:
        "200":
          description: Logout successful

  /anime/:
    get:
      summary: Search for anime titles
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: The search term for the anime title.
      responses:
        "200":
          description: A list of anime matching the search term.

  /user/list/:
    get:
      summary: Get the current user's anime list
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [Watching, Completed, Plan to Watch, On-Hold, Dropped]
          description: Filter the list by tracking status.
      responses:
        "200":
          description: The user's filtered anime list.
    post:
      summary: Add an anime to the user's list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                anime_id:
                  type: integer
                tracking_status:
                  type: string
      responses:
        "201":
          description: Anime successfully added to the list.
