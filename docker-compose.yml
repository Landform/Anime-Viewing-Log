version: '3.9'

services:
  backend:
    build: ./backend
    command: gunicorn backend.wsgi:application --bind 0.0.0.0:${PORT}
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DEBUG=False
      - DATABASE_URL=${DATABASE_URL}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
    # Note: No "ports:" mapping here! Render injects $PORT automatically.

  frontend:
    build: ./frontend
    ports:
      - "80:80"  # Frontend runs on standard HTTP port
