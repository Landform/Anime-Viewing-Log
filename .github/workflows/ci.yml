# .github/workflows/ci.yml

name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- Job 1: Backend Checks (Unchanged, looks good) ---
  lint-and-test-backend:
    runs-on: ubuntu-latest
    name: Lint & Test Backend
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run linter (flake8)
      run: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # --- Job 2: Frontend Checks (Corrected) ---
  build-and-test-frontend:
    runs-on: ubuntu-latest
    name: Build & Test Frontend
    needs: lint-and-test-backend # Good practice: only test frontend if backend passes
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        # CORRECTED PATH: The lock file is in 'frontend/', not 'frontend/vite-project/'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      # CORRECTED PATH: All commands will now run from the correct directory.
      working-directory: ./frontend
      run: npm ci

    # REMOVED LINT/BUILD: Our E2E tests are the most important check.
    # We can add linting back later if needed, but let's focus on getting E2E working first.
    # A passing E2E test proves the app can be built and run.

    - name: Install Playwright Browsers
      working-directory: ./frontend
      run: npx playwright install --with-deps

    - name: Run Playwright E2E tests
      # ADDED env: To securely pass test credentials to the tests
      env:
        TEST_USER_NAME: ${{ secrets.TEST_USER_NAME }}
        TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      working-directory: ./frontend
      # MODIFIED: Added a command to start the backend in the background
      run: |
        # Start the backend server in the background
        # This is necessary so Playwright has a live API to test against
        sudo docker compose up -d backend db
        
        # Give the backend a moment to start up
        sleep 5
        
        # Run the tests
        npx playwright test

    - name: Upload Playwright Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30