name: Continuous Integration

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # --- Job 1: Backend Checks ---
  lint-and-test-backend:
    runs-on: ubuntu-latest
    name: Lint & Test Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip" # Enable caching for pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run linter (flake8)
        # This checks for Python style guide violations (PEP8)
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings. To fail the build, remove --exit-zero
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # --- Job 2: Frontend Checks ---
  build-and-test-frontend:
    runs-on: ubuntu-latest
    name: Build & Test Frontend
    # This job will run in parallel with the backend job

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm" # Enable caching for npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend/vite-project
        run: npm ci # 'ci' is faster and more reliable for CI environments than 'install'

      - name: Run linter and type-checker (ESLint & TSC)
        # This checks for TypeScript errors and style guide violations
        working-directory: ./frontend/vite-project
        run: npm run lint

      - name: Build the frontend
        # This ensures the project can be built for production without errors
        working-directory: ./frontend/vite-project
        run: npm run build

      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps

      - name: Run Playwright E2E tests
        working-directory: ./frontend
        run: npx playwright test
