# .github/workflows/ci.yml

name: Continuous Integration

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test-backend:
    # ... (backend job remains the same) ...

  build-and-test-frontend:
    runs-on: ubuntu-latest
    name: Build & Test Frontend
    needs: lint-and-test-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        # ... (this step is now correct) ...

      - name: Install frontend dependencies
        # ... (this step is now correct) ...

      # We are removing the separate "lint" and "build" steps because
      # the E2E test is the ultimate proof. If it passes, we know the app
      # can build and run. This simplifies the pipeline.

      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps

      - name: Create .env file for Docker Compose
        run: |
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "TEST_USER_NAME=${{ secrets.TEST_USER_NAME }}" >> .env
          echo "TEST_USER_PASSWORD=${{ secrets.TEST_USER_PASSWORD }}" >> .env

      - name: Run Playwright E2E tests
        working-directory: ./frontend
        run: |
          # Go back to root to run docker compose
          cd ..

          # Start the backend and database in the background
          sudo docker compose up -d db backend

          # Give the services a few seconds to start up fully
          echo "Waiting for services to start..."
          sleep 15

          # Go back to the frontend directory to run the tests
          cd frontend
          npx playwright test

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
