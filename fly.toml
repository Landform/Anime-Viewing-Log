# fly.toml file generated for your-app-name
app = "your-app-name" # <-- CHANGE THIS TO A UNIQUE NAME
primary_region = "iad" # <-- CHANGE THIS TO YOUR PREFERRED REGION (e.g., 'lhr' for London)

[build]
  # Fly.io will automatically detect and use your Dockerfile

[env]
  PORT = "8000" # Matches the EXPOSE and Gunicorn port in your Dockerfile

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0 # Allows the app to scale to 0 (free tier)
  processes = ["app"]

[[statics]]
  guest_path = "/home/app/staticfiles" # Matches STATIC_ROOT in your Django settings
  url_prefix = "/static/"