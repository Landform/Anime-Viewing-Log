# The top-level key for managed databases
databases:
  - name: anime-db
    plan: free # Use the free database tier
    postgresMajorVersion: 15 # Match your Docker image version
    region: oregon # You can choose a different region, e.g., frankfurt

# The top-level key for your web services, workers, etc.
services:
  - type: web
    name: backend
    plan: free # Use the free web service tier
    region: oregon # Use the same region as your database
    dockerfilePath: ./Dockerfile # Path to your backend Dockerfile
    healthCheckPath: /health/
    
    # Render provides a $PORT variable that your app must listen on
    startCommand: "gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT"

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: anime-db # Correct way to reference the database
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true # Let Render create a secure secret key
      - key: APP_HOSTNAME
        fromService:
          type: web
          name: backend
          property: host # Automatically get the hostname
      - key: DEBUG
        value: 0
      - key: PYTHONUNBUFFERED
        value: 1