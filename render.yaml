databases:
  - name: anime-db
    plan: free
    postgresMajorVersion: 15
    region: oregon

services:
  - type: web
    name: backend
    plan: free
    region: oregon
    
    # Specify the runtime and the path to the Dockerfile
    runtime: docker
    dockerfilePath: ./Dockerfile
    
    # Health check remains
    healthCheckPath: /health/

    # Render will use the CMD from your Dockerfile.
    # It automatically maps its internal port to the exposed 8000 port.

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: anime-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true # Render will create a secure secret key for you
      - key: DEBUG
        value: 0
      - key: PYTHONUNBUFFERED
        value: 1