databases:
  - name: anime-db
    plan: free
    postgresMajorVersion: 15
    region: oregon

services:
  - type: web
    name: backend
    plan: free
    region: oregon
    
    # --- THIS IS THE CRITICAL FIX ---
    runtime: docker # Explicitly tell Render to use Docker
    dockerfilePath: ./Dockerfile # Now this will be correctly recognized
    
    # The health check and start command remain the same
    healthCheckPath: /health/
    startCommand: "gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT"

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: anime-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: APP_HOSTNAME
        fromService:
          type: web
          name: backend
          property: host
      - key: DEBUG
        value: 0
      - key: PYTHONUNBUFFERED
        value: 1