services:
  # 1. The PostgreSQL Database
  # The type is 'private' for internal services like databases.
  - type: psql
    name: anime-db
    plan: free # Use the free database tier
    psqlVersion: 15 # Match your Docker image version
    region: oregon # You can choose a different region, e.g., frankfurt

  # 2. The Django Backend Service
  - type: web
    name: backend
    plan: free # Use the free web service tier
    region: oregon # Use the same region as your database
    dockerfilePath: ./Dockerfile # Path to your backend Dockerfile
    healthCheckPath: /health/ # The health check endpoint we added to urls.py
    
    # Define the command to run when the container starts
    startCommand: "gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT"

    envVars:
      - key: DATABASE_URL
        fromService:
          type: psql
          name: anime-db # Tells Render to get the DB URL from the 'anime-db' service
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true # Let Render generate a secure secret key for you
      - key: APP_HOSTNAME
        fromService:
          type: web
          name: backend
          property: host # Automatically get the hostname from the web service
      - key: DEBUG
        value: 0
      - key: PYTHONUNBUFFERED # Best practice for Docker logs
        value: 1
    
    autoDeploy: true # Automatically deploy when you push to the 'main' branch
    
    # Define a pre-deploy step to run database migrations
    preDeploy:
      - command: "python manage.py migrate"