databases:
  - name: anime-db
    plan: free
    postgresMajorVersion: 15
    region: oregon

services:
  - type: web
    name: backend
    plan: free
    region: oregon
    
    # Specify the runtime and the path to the Dockerfile
    runtime: docker
    dockerfilePath: ./Dockerfile
    
    # Health check remains
    healthCheckPath: /health/

    # NO startCommand HERE. Render will use the CMD from your Dockerfile:
    # CMD ["gunicorn", "backend.wsgi:application", "--bind", "0.0.0.0:8000"]
    # Render will automatically map its internal $PORT to the exposed 8000 port.

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: anime-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: APP_HOSTNAME
        fromService:
          type: web
          name: backend
          property: host
      - key: DEBUG
        value: 0
      - key: PYTHONUNBUFFERED
        value: 1