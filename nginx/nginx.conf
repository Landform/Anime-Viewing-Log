server {
    listen 80;
    server_name 192.168.1.214;

    # --- Security Headers (Good Practice) ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Serve the React Frontend ---
    location / {
        root   /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    # --- Reverse Proxy for the Django Backend ---
    # This single block will handle /api, /admin, etc.
    location ~ ^/(api|admin) {
        # This is where the request is forwarded to our backend service
        proxy_pass http://backend:8000;

        # --- THIS IS THE CRUCIAL PART ---
        # These headers pass information from the original user request to Django
        
        # Tells Django what the original Host was (e.g., 192.168.1.214)
        proxy_set_header Host $host;
        
        # Tells Django the original IP address of the user
        proxy_set_header X-Real-IP $remote_addr;
        
        # A list of IP addresses the request has passed through
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Tells Django if the original request was HTTP or HTTPS
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}